name: c

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install poetry

      - run: poetry install

      - run: poetry run bandit -r .
      - run: poetry run ruff check .
      - run: poetry run safety check